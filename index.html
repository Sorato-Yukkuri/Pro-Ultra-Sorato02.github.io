<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>精密デバイス診断Pro Ultra 移行のお知らせ</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: #fff;
}

.container {
  max-width: 520px;
  margin: 80px auto;
  background: #0b1120;
  padding: 32px;
  border-radius: 16px;
  border: 1px solid #1e293b;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  text-align: center;
}

.badge {
  background: #ef4444;
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 12px;
  display: inline-block;
  margin-bottom: 12px;
}

h1 {
  font-size: 22px;
  margin-bottom: 10px;
}

p {
  font-size: 14px;
  color: #94a3b8;
  line-height: 1.6;
}

.buttons {
  margin-top: 24px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

button, a {
  padding: 12px;
  border-radius: 10px;
  font-size: 14px;
  text-decoration: none;
  border: none;
  cursor: pointer;
}

.primary {
  background: linear-gradient(90deg,#6366f1,#8b5cf6);
  color: #fff;
  font-weight: bold;
}

.secondary {
  background: #111827;
  color: #e5e7eb;
  border: 1px solid #1f2937;
}

.footer {
  margin-top: 20px;
  font-size: 12px;
  color: #64748b;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #020617;
  padding: 12px 16px;
  border-radius: 8px;
  border: 1px solid #334155;
  z-index: 9999;
}

/* Modal */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9998;
}

.modal-box {
  background: #0b1120;
  padding: 24px;
  border-radius: 12px;
  border: 1px solid #334155;
  max-width: 480px;
  width: 90%;
}

.modal-box h2 {
  margin-top: 0;
  color: #facc15;
}
</style>
</head>

<body>

<div class="container">
  <div class="badge">重要</div>

  <h1>サービスは新サイトへ移行しました</h1>

  <p>
    このサイトでの診断機能は終了しました。<br>
    続きを利用するには新サイトをご利用ください。
  </p>

  <div class="buttons">
    <a class="primary" href="https://pro-ultra.pages.dev/">
      新サイトへ進む →
    </a>

    <button class="secondary" onclick="downloadStorageData()">
      データをダウンロード
    </button>

    <button class="secondary" onclick="openGuide()">
      移行手順を見る
    </button>
  </div>

  <div class="footer">
    ※ データは新サイトで復元してください
  </div>
</div>

<script>
/* 対象キー */
const KEYS = [
 'diag_history',
 'ai_conversations',
 'custom_bad_color',
 'custom_ok_color',
 'custom_warn_color',
 'pu_skin_v1'
];

/* Toast */
function toast(msg){
  const t=document.createElement('div');
  t.className='toast';
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

/* ダウンロード */
function downloadStorageData(){
  let data={},has=false;

  KEYS.forEach(k=>{
    const v=localStorage.getItem(k);
    if(v){
      data[k]=v;
      has=true;
    }
  });

  if(!has){
    toast('保存データがありません');
    return;
  }

  const blob=new Blob(
    [JSON.stringify(data,null,2)],
    {type:'application/json'}
  );

  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');

  a.href=url;
  a.download='pro-ultra-backup.json';
  a.click();

  URL.revokeObjectURL(url);

  toast('ダウンロードしました');
}

/* ガイドモーダル */
function openGuide(){
  const modal=document.createElement('div');
  modal.className='modal';

  modal.innerHTML=`
    <div class="modal-box">
      <h2>データ移行手順</h2>

      <div style="font-size:14px; line-height:1.7; color:#cbd5f5">

        <p><b>① データをバックアップ</b><br>
        「データをダウンロード」を押してJSONファイルを保存します。</p>

        <p><b>② 新サイトへアクセス</b><br>
        下のボタンから新しいサイトへ移動します。</p>

        <p><b>③ データを復元</b><br>
        新サイトの「データ管理」からアップロードしてください。</p>

        <hr style="border-color:#334155; margin:16px 0">

        <p style="color:#f87171;">
        ※ このサイトでは復元できません<br>
        ※ 必ず新サイトで復元してください
        </p>

      </div>

      <a href="https://pro-ultra.pages.dev/"
         style="display:block; margin-top:16px; padding:12px;
         background:#6366f1; color:#fff; text-align:center; border-radius:8px;">
        新サイトへ進む →
      </a>

      <button onclick="this.closest('.modal').remove()"
        style="width:100%; margin-top:10px;">
        閉じる
      </button>
    </div>
  `;

  document.body.appendChild(modal);
}
</script>

</body>
</html>
